<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gurukul – Ancient Wisdom for Modern Life</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/main.css" />
  <link rel="stylesheet" href="src/styles/game.css" />
  <link rel="stylesheet" href="src/styles/authV4.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/css/index.css" />
  <script src="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-keyboard-layouts@latest/build/index.js"></script>
  <style>
    /* ── Landing ── */
    #screen-landing {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(212, 175, 55, 0.07) 0%, transparent 70%);
    }

    .landing-inner {
      width: 100%;
      max-width: 700px;
    }

    .mandala-svg {
      width: 110px;
      height: 110px;
      margin: 0 auto 28px;
    }

    .landing-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .landing-title {
      font-size: clamp(28px, 5vw, 52px);
      margin-bottom: 8px;
    }

    .landing-subtitle {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .landing-tagline {
      font-size: 17px;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 460px;
      line-height: 1.8;
      margin: 0 auto 3rem;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
    }

    .mode-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-lg);
      padding: 24px 20px;
      cursor: pointer;
      transition: all .25s;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .mode-card:hover {
      border-color: var(--gold-border-hi);
      transform: translateY(-3px);
    }

    .mode-card.featured {
      border-color: var(--gold-dim);
      background: linear-gradient(145deg, rgba(212, 175, 55, 0.07), var(--surface) 60%);
    }

    .featured-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--gold);
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.25);
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .mode-icon {
      font-size: 32px;
    }

    .mode-title {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--gold);
    }

    .mode-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ── Problem ── */
    #screen-problem {
      background: var(--bg);
    }

    .problem-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      gap: 16px;
    }

    .problem-body h2 {
      text-align: center;
    }

    .problem-body>p {
      text-align: center;
    }

    .char-count {
      font-size: 12px;
      color: var(--text-dim);
      align-self: flex-end;
    }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .input-error {
      border-color: #E24B4A !important;
      animation: shake .3s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-6px)
      }

      75% {
        transform: translateX(6px)
      }
    }

    .error-msg {
      color: #E24B4A;
      font-size: 13px;
    }

    /* ── Persona ── */
    #screen-persona {
      background: var(--bg);
    }

    .persona-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      gap: 16px;
    }

    .problem-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-sm);
      padding: 12px 18px;
      width: 100%;
    }

    .problem-preview-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .problem-preview-text {
      font-size: 14px;
      color: var(--text-muted);
      flex: 1;
    }

    .persona-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .persona-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: var(--surface);
      border: 2px solid var(--gold-border);
      border-radius: var(--r-lg);
      padding: 32px 20px 24px;
      cursor: pointer;
      transition: all .3s;
      position: relative;
      overflow: hidden;
    }

    .persona-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--p-bg, transparent), transparent 70%);
      opacity: 0;
      transition: opacity .3s;
    }

    .persona-card:hover::before {
      opacity: 1;
    }

    .persona-card:hover {
      transform: translateY(-4px);
      border-color: var(--p-border, var(--gold-border-hi));
    }

    .persona-card.selected {
      border-color: var(--p-accent) !important;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--p-accent, #fff) 20%, transparent);
    }

    .persona-emoji {
      font-size: 44px;
      margin-bottom: 14px;
    }

    .persona-name {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .persona-tradition {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .persona-tagline {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .persona-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .persona-tag {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    /* ── Response ── */
    #screen-response {
      background: var(--bg);
      overflow: hidden;
    }

    .response-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      max-height: calc(100vh - 64px);
    }

    .response-main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .response-sidebar {
      width: 290px;
      border-left: 1px solid var(--gold-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    @media(max-width:768px) {
      .response-sidebar {
        display: none
      }

      .response-main {
        padding: 18px 16px
      }
    }

    .persona-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .switcher-label {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .switch-btn {
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
      font-family: 'Lato', sans-serif;
    }

    .switch-btn:hover {
      border-color: var(--gold-border-hi);
      color: var(--text);
    }

    .switch-btn.active {
      font-weight: 700;
    }

    .context-bar {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-sm);
      padding: 12px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .context-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .context-text {
      font-size: 14px;
      color: var(--text-muted);
      flex: 1;
    }

    .response-card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-lg);
      padding: 22px;
      margin-bottom: 14px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .card-icon {
      font-size: 18px;
    }

    .card-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .card-body {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-muted);
    }

    .card-body p+p {
      margin-top: 10px;
    }

    .advice-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .advice-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .advice-tag {
      min-width: 52px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .advice-tag.do {
      background: rgba(58, 155, 140, 0.12);
      color: #3A9B8C;
      border: 1px solid rgba(58, 155, 140, 0.3);
    }

    .advice-tag.avoid {
      background: rgba(226, 75, 74, 0.1);
      color: #E24B4A;
      border: 1px solid rgba(226, 75, 74, 0.25);
    }

    .advice-tag.think {
      background: rgba(212, 175, 55, 0.1);
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, 0.25);
    }

    .reflect-cta {
      margin: 8px 0 20px;
    }

    .error-banner {
      background: rgba(226, 75, 74, 0.1);
      border: 1px solid rgba(226, 75, 74, 0.3);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #E24B4A;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.5px;
    }

    .sidebar-persona-name {
      font-size: 11px;
      text-transform: capitalize;
      color: var(--text-dim);
      font-family: 'Lato', sans-serif;
      letter-spacing: 1px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-input-wrap {
      border-top: 1px solid var(--gold-border);
      padding: 10px;
      display: flex;
      gap: 8px;
    }

    .sidebar-input {
      flex: 1;
      font-size: 13px;
      padding: 10px 14px;
    }

    .send-btn {
      background: var(--gold-dim);
      border: none;
      color: #0D0B08;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--gold);
    }

    .quick-prompts {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      border-top: 1px solid var(--gold-border);
      flex-wrap: wrap;
    }

    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
      font-family: 'Lato', sans-serif;
    }

    .quick-btn:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }

    .dot-pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      margin: 0 2px;
      animation: pulse .8s ease-in-out infinite;
    }

    .dot-pulse:nth-child(2) {
      animation-delay: .15s
    }

    .dot-pulse:nth-child(3) {
      animation-delay: .3s
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .3;
        transform: scale(1)
      }

      50% {
        opacity: 1;
        transform: scale(1.3)
      }
    }

    .quiz-card {
      border-color: var(--gold-dim) !important;
    }

    .tradition-tag {
      margin-left: auto;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .quiz-question {
      font-size: 16px;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-option {
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      text-align: left;
      transition: all .2s;
      font-family: 'Lato', sans-serif;
    }

    .quiz-option:hover {
      border-color: var(--gold-border-hi);
    }

    .quiz-option.selected {
      border-color: var(--gold-dim);
      background: var(--gold-faint);
    }

    .quiz-option.dimmed {
      opacity: .45;
    }

    .quiz-option:disabled {
      cursor: default;
    }

    .option-letter {
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .option-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .quiz-feedback {
      margin-top: 16px;
    }

    .feedback-inner {
      background: rgba(212, 175, 55, 0.06);
      border: 1px solid var(--gold-dim);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .feedback-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .feedback-inner p {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
    }

    /* ── Learn screen ── */
    #screen-learn {
      overflow-y: auto;
      overflow-x: hidden;
    }

    #cards-view {
      display: block;
    }

    .topic-tabs {
      display: flex;
      border-bottom: 1px solid var(--gold-border);
      padding: 0 28px;
      overflow-x: auto;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 13px 22px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      margin-bottom: -1px;
    }

    .tab-btn:hover {
      color: var(--text-muted);
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .topic-panel {
      display: none;
    }

    .topic-panel.active {
      display: block;
    }

    .topic-header {
      padding: 28px 28px 20px;
      max-width: 940px;
      margin: 0 auto;
    }

    .t-eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 6px;
    }

    .t-name {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .t-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .t-pill {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 3px 12px;
    }

    .t-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 680px;
    }

    .sec-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
      padding: 0 28px 14px;
      max-width: 940px;
      margin: 0 auto;
      display: block;
    }

    .info-bar {
      margin: 0 auto 20px;
      max-width: 940px;
      padding: 0 28px;
    }

    .info-bar-inner {
      background: var(--gold-faint);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .info-bar-inner strong {
      color: var(--gold);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 14px;
      padding: 0 28px 48px;
      max-width: 940px;
      margin: 0 auto;
    }

    .learn-card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-lg);
      padding: 20px 20px 16px;
      transition: all .3s;
      position: relative;
      overflow: hidden;
      animation: fadeUp .35s ease both;
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .learn-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--gold-dim);
      border-radius: 3px 0 0 3px;
      transition: background .2s;
    }

    .learn-card:hover {
      border-color: var(--gold-border-hi);
      transform: translateY(-2px);
    }

    .learn-card:hover::before {
      background: var(--gold);
    }

    .learn-card.gc::before {
      background: var(--green);
    }

    .learn-card.oc::before {
      background: var(--orange);
    }

    .c-ey {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .c-ey.g {
      color: var(--green);
    }

    .c-ey.o {
      color: var(--orange);
    }

    .c-sk {
      font-family: 'Noto Sans Devanagari', 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      line-height: 1.5;
    }

    .c-ro {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    .c-hr {
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
      opacity: .25;
      margin: 4px 0;
    }

    .c-ti {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    .c-pr {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .c-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }

    .c-tag {
      font-size: 10px;
      padding: 2px 9px;
      border-radius: 20px;
      background: var(--gold-faint);
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: var(--gold-dim);
    }

    .c-tag.g {
      background: rgba(58, 155, 140, .08);
      border-color: rgba(58, 155, 140, .25);
      color: var(--green);
    }

    .c-tag.o {
      background: rgba(196, 107, 58, .08);
      border-color: rgba(196, 107, 58, .25);
      color: var(--orange);
    }

    .rm-btn {
      margin-top: 10px;
      align-self: flex-start;
      background: none;
      border: 1px solid var(--gold-border);
      border-radius: var(--r-sm);
      padding: 7px 16px;
      font-size: 12px;
      font-family: 'Cinzel', serif;
      color: var(--gold-dim);
      cursor: pointer;
      letter-spacing: .5px;
      transition: all .2s;
    }

    .rm-btn:hover {
      background: var(--gold-faint);
      border-color: var(--gold-border-hi);
      color: var(--gold);
    }

    .rm-btn.g {
      border-color: rgba(58, 155, 140, .3);
      color: var(--green);
    }

    .rm-btn.g:hover {
      background: rgba(58, 155, 140, .07);
      border-color: var(--green);
    }

    .rm-btn.o {
      border-color: rgba(196, 107, 58, .3);
      color: var(--orange);
    }

    .rm-btn.o:hover {
      background: rgba(196, 107, 58, .07);
      border-color: var(--orange);
    }

    /* ── Detail view ── */
    #detail-view {
      display: none;
      min-height: 100vh;
      animation: fadeIn .3s ease;
    }

    .det-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      border-bottom: 1px solid var(--gold-border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .close-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--gold-border);
      color: var(--text-muted);
      border-radius: var(--r-sm);
      padding: 8px 18px;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 700;
      transition: all .2s;
    }

    .close-btn:hover {
      border-color: var(--gold-border-hi);
      color: var(--gold);
    }

    .det-hdr-name {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      flex: 1;
    }

    .det-hdr-sub {
      font-size: 12px;
      color: var(--text-dim);
    }

    .det-body {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 28px 60px;
    }

    .d-eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }

    .d-sk {
      font-family: 'Noto Sans Devanagari', 'Cinzel', serif;
      font-size: 30px;
      color: var(--gold);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .d-ro {
      font-size: 14px;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 10px;
    }

    .d-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--text);
      margin-bottom: 12px;
    }

    .d-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .d-pill {
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 4px 14px;
      color: var(--text-dim);
    }

    .d-pill.g {
      border-color: rgba(58, 155, 140, .3);
      color: var(--green);
      background: rgba(58, 155, 140, .06);
    }

    .d-pill.o {
      border-color: rgba(196, 107, 58, .3);
      color: var(--orange);
      background: rgba(196, 107, 58, .06);
    }

    .d-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .d-tag {
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 20px;
      background: var(--gold-faint);
      border: 1px solid rgba(212, 175, 55, .2);
      color: var(--gold-dim);
    }

    .d-tag.g {
      background: rgba(58, 155, 140, .08);
      border-color: rgba(58, 155, 140, .25);
      color: var(--green);
    }

    .gold-hr {
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
      opacity: .3;
      margin: 24px 0;
    }

    .d-sec {
      margin-bottom: 28px;
    }

    .d-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .d-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold-border);
    }

    .shloka-box {
      background: var(--gold-faint);
      border-left: 3px solid var(--gold-dim);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      padding: 16px 20px;
      margin-bottom: 8px;
    }

    .shloka-box.g {
      border-left-color: var(--green);
    }

    .shloka-box.o {
      border-left-color: var(--orange);
    }

    .sk-text {
      font-family: 'Noto Sans Devanagari', serif;
      font-size: 18px;
      color: var(--gold);
      line-height: 1.9;
      margin-bottom: 6px;
    }

    .sk-trans {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.7;
    }

    .d-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.85;
    }

    .d-text strong {
      color: var(--text);
      font-weight: 700;
    }

    .lesson-box {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      padding: 20px 24px;
      font-size: 17px;
      font-style: italic;
      color: var(--text);
      line-height: 1.7;
      border-left: 4px solid var(--gold-dim);
    }

    .lesson-box.g {
      border-left-color: var(--green);
    }

    .lesson-box.o {
      border-left-color: var(--orange);
    }

    .story-blk {
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      padding: 18px 20px;
      margin-bottom: 12px;
    }

    .story-blk-t {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .story-blk-s {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .story-blk-l {
      font-size: 12px;
      color: var(--gold-dim);
      font-style: italic;
    }

    .ayur-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 4px;
    }

    @media(max-width:520px) {
      .ayur-row {
        grid-template-columns: 1fr
      }
    }

    .ayur-blk {
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      padding: 14px 16px;
    }

    .ayur-blk-l {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .ayur-blk-t {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .warn-box {
      background: rgba(226, 75, 74, .07);
      border: 1px solid rgba(226, 75, 74, .25);
      border-radius: var(--r-md);
      padding: 14px 18px;
      font-size: 13px;
      color: #E24B4A;
      line-height: 1.65;
    }

    .det-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--gold-border);
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-sm);
      padding: 10px 20px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }

    .nav-btn:hover {
      border-color: var(--gold-border-hi);
      color: var(--gold);
    }

    .nav-btn:disabled {
      opacity: .3;
      cursor: not-allowed;
    }

    .nav-ctr {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Shared animations ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* ── Learn screen ── */
    #screen-learn {
      background: var(--bg);
    }

    .learn-screen-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 28px;
      border-bottom: 1px solid var(--gold-border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    /* ── XP toast ── */
    .level-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--gold-dim);
      border-radius: var(--r-md);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      color: var(--text);
      transition: opacity .5s;
      z-index: 100;
    }

    .level-toast.hiding {
      opacity: 0;
    }

    .toast-icon {
      font-size: 24px;
    }

    .level-toast strong {
      display: block;
      color: var(--gold);
      font-size: 15px;
    }

    .level-toast p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 2px;
    }

    /* ── Manuscript Translator ─────────────────────────────────────────── */
    .translate-body {
      flex: 1;
      padding: 32px 28px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    
    .translate-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    
    .translate-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: stretch;
    }
    
    @media(max-width: 768px) {
      .translate-layout {
        grid-template-columns: 1fr;
      }
    }
    
    .translate-left, .translate-right {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .translate-box {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .box-header {
      padding: 12px 16px;
      background: rgba(212, 175, 55, 0.05);
      border-bottom: 1px dashed var(--gold-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .box-icon {
      font-size: 16px;
    }
    
    .box-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
    }
    
    .translate-textarea {
      width: 100%;
      height: 180px;
      background: transparent;
      border: none;
      padding: 16px;
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      resize: none;
      outline: none;
    }
    
    .translate-upload {
      padding: 16px;
      border-top: 1px dashed var(--gold-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .translate-upload:hover {
      background: rgba(212, 175, 55, 0.03);
    }
    
    .upload-icon {
      font-size: 24px;
      margin-bottom: 4px;
      opacity: 0.8;
    }
    
    .upload-text {
      font-size: 14px;
      color: var(--text-muted);
    }
    
    .upload-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    
    .translate-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      padding: 12px 16px;
    }
    
    .lang-selector {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .lang-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
    }
    
    .lang-select {
      background: var(--bg2);
      border: 1px solid var(--gold-border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--r-sm);
      font-size: 14px;
      font-family: 'Lato', sans-serif;
      width: 100%;
      outline: none;
      appearance: none;
    }
    
    .sample-card {
      background: transparent;
      border-bottom: 1px solid var(--gold-border);
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .sample-card:last-child {
      border-bottom: none;
    }
    
    .sample-card:hover {
      background: rgba(212, 175, 55, 0.05);
    }
    
    .sample-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }
    
    .sample-excerpt {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .translate-right {
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-lg);
      overflow-y: auto;
      max-height: calc(100vh - 160px);
    }
    
    .translate-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .empty-sub {
      font-size: 13px;
    }
    
    .translate-result {
      animation: fadeIn 0.4s ease;
    }
    
    .result-header {
      padding: 16px 20px;
      background: rgba(212, 175, 55, 0.08);
      border-bottom: 1px solid var(--gold-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .result-section {
      padding: 20px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }
    
    .result-section:last-child {
      border-bottom: none;
    }
    
    .result-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }
    
    .result-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
    }
    
    .key-terms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .term-card {
      background: rgba(212, 175, 55, 0.03);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-sm);
      padding: 10px 14px;
    }
    
    .term-orig {
      font-weight: 700;
      color: var(--gold);
      font-size: 14px;
      margin-bottom: 2px;
    }
    
    .term-meaning {
      font-size: 13px;
      color: var(--text-muted);
    }
    /* ═══ Quiz Generator ═══════════════════════════════════════ */
    .qg-body {
      flex: 1;
      padding: 32px 28px 60px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .qg-hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .qg-hero-icon {
      font-size: 56px;
      margin-bottom: 12px;
      animation: drift 4s ease-in-out infinite;
    }

    .qg-hero-title {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .qg-hero-sub {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .qg-mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media(max-width: 600px) {
      .qg-mode-grid { grid-template-columns: 1fr; }
    }

    .qg-mode-card {
      background: var(--surface);
      border: 2px solid var(--gold-border);
      border-radius: var(--r-lg);
      padding: 28px 22px;
      cursor: pointer;
      transition: all .3s;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .qg-mode-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08), transparent 70%);
      opacity: 0;
      transition: opacity .3s;
    }

    .qg-mode-card:hover::before { opacity: 1; }

    .qg-mode-card:hover {
      border-color: var(--gold-border-hi);
      transform: translateY(-3px);
    }

    .qg-mode-card.selected {
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15), 0 8px 24px rgba(212, 175, 55, 0.1);
    }

    .qg-mode-icon { font-size: 36px; margin-bottom: 10px; }

    .qg-mode-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .qg-mode-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .qg-mode-badge {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 3px 12px;
      display: inline-block;
    }

    /* Form Panel */
    .qg-form-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: fadeUp .35s ease both;
    }

    /* Upload Zone */
    .qg-upload-zone {
      background: var(--surface);
      border: 2px dashed var(--gold-border);
      border-radius: var(--r-lg);
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .3s;
    }

    .qg-upload-zone:hover, .qg-upload-zone.dragover {
      border-color: var(--gold);
      background: rgba(212, 175, 55, 0.04);
    }

    .qg-upload-icon { font-size: 36px; margin-bottom: 8px; }
    .qg-upload-text { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
    .qg-upload-hint { font-size: 11px; color: var(--text-dim); }

    /* Slider row */
    .qg-num-row {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qg-num-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .qg-slider-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .qg-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      outline: none;
    }

    .qg-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
    }

    .qg-slider-val {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: var(--gold);
      min-width: 30px;
      text-align: center;
    }

    /* Topic input */
    .qg-topic-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .qg-topic-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .qg-topic-field {
      font-size: 16px !important;
      padding: 14px 18px !important;
    }

    .qg-generate-btn {
      padding: 14px !important;
      font-size: 15px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .qg-generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .qg-error {
      background: rgba(226, 75, 74, 0.1);
      border: 1px solid rgba(226, 75, 74, 0.3);
      border-radius: var(--r-sm);
      padding: 12px 16px;
      font-size: 14px;
      color: #E24B4A;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Loading */
    .qg-loading-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 60vh;
    }

    .qg-loading-orb {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qg-orb-ring {
      position: absolute;
      inset: 0;
      border: 2px solid var(--gold-border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .qg-orb-ring.delay {
      inset: 8px;
      border-top-color: var(--gold-dim);
      animation-duration: 1.8s;
      animation-direction: reverse;
    }

    .qg-orb-icon { font-size: 32px; z-index: 1; }

    .qg-loading-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold);
    }

    .qg-loading-sub {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      max-width: 400px;
    }

    .qg-loading-dots {
      display: flex;
      gap: 6px;
    }

    /* Quiz Play */
    .qg-play-body {
      flex: 1;
      padding: 0 28px 60px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    .qg-progress-badge {
      margin-left: auto;
      font-size: 13px;
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }

    .qg-progress-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin: 20px 0;
      overflow: hidden;
    }

    .qg-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 2px;
      transition: width .5s ease;
    }

    .qg-question-card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-lg);
      padding: 28px 24px;
    }

    .qg-q-number {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 10px;
    }

    .qg-q-text {
      font-size: 17px;
      color: var(--text);
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .qg-options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    .qg-option {
      background: var(--surface2);
      border: 2px solid var(--gold-border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .25s;
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
      text-align: left;
      width: 100%;
    }

    .qg-option:hover:not(:disabled) {
      border-color: var(--gold-border-hi);
      background: rgba(212, 175, 55, 0.04);
    }

    .qg-option.selected {
      border-color: var(--gold);
      background: rgba(212, 175, 55, 0.08);
    }

    .qg-option.correct {
      border-color: #3A9B8C !important;
      background: rgba(58, 155, 140, 0.1) !important;
      color: var(--text) !important;
    }

    .qg-option.wrong {
      border-color: #E24B4A !important;
      background: rgba(226, 75, 74, 0.08) !important;
    }

    .qg-option.dimmed {
      opacity: 0.35;
    }

    .qg-opt-letter {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }

    .qg-option.correct .qg-opt-letter {
      background: rgba(58, 155, 140, 0.2);
      border-color: #3A9B8C;
      color: #3A9B8C;
    }

    .qg-option.wrong .qg-opt-letter {
      background: rgba(226, 75, 74, 0.15);
      border-color: #E24B4A;
      color: #E24B4A;
    }

    .qg-opt-text { flex: 1; line-height: 1.5; }

    .qg-opt-check {
      font-size: 18px;
      color: #3A9B8C;
      font-weight: 700;
    }

    .qg-opt-cross {
      font-size: 18px;
      color: #E24B4A;
      font-weight: 700;
    }

    .qg-submit-answer, .qg-next-btn {
      width: 100%;
      padding: 13px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Feedback box */
    .qg-feedback-box {
      border-radius: var(--r-md);
      padding: 16px 18px;
      margin-bottom: 16px;
      animation: fadeUp .3s ease both;
    }

    .qg-feedback-box.correct {
      background: rgba(58, 155, 140, 0.08);
      border: 1px solid rgba(58, 155, 140, 0.3);
    }

    .qg-feedback-box.wrong {
      background: rgba(226, 75, 74, 0.06);
      border: 1px solid rgba(226, 75, 74, 0.25);
    }

    .qg-fb-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .qg-fb-icon { font-size: 20px; }

    .qg-fb-title {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 700;
    }

    .qg-feedback-box.correct .qg-fb-title { color: #3A9B8C; }
    .qg-feedback-box.wrong .qg-fb-title { color: #E24B4A; }

    .qg-fb-explain {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* Results */
    .qg-results-body {
      flex: 1;
      padding: 32px 28px 60px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    .qg-results-hero {
      text-align: center;
      padding: 40px 0;
      animation: fadeUp .5s ease both;
    }

    .qg-results-orb {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.06);
      border: 2px solid var(--grade-color, var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 0 30px color-mix(in srgb, var(--grade-color, var(--gold)) 20%, transparent);
      animation: drift 3s ease-in-out infinite;
    }

    .qg-results-icon { font-size: 40px; }

    .qg-results-grade {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .qg-results-score {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin-bottom: 6px;
    }

    .qg-score-big {
      font-family: 'Cinzel', serif;
      font-size: 48px;
      color: var(--gold);
      font-weight: 700;
    }

    .qg-score-sep {
      font-size: 28px;
      color: var(--text-dim);
    }

    .qg-score-total {
      font-size: 28px;
      color: var(--text-dim);
    }

    .qg-results-pct {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .qg-results-source {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Breakdown */
    .qg-results-breakdown {
      margin-top: 32px;
    }

    .qg-rb-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 14px;
    }

    .qg-rb-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      margin-bottom: 8px;
      animation: fadeUp .3s ease both;
    }

    .qg-rb-item.correct { border-left: 3px solid #3A9B8C; }
    .qg-rb-item.wrong { border-left: 3px solid #E24B4A; }

    .qg-rb-num {
      min-width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }

    .qg-rb-content { flex: 1; }

    .qg-rb-question {
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .qg-rb-answer {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .qg-rb-badge {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .qg-rb-badge.correct {
      background: rgba(58, 155, 140, 0.15);
      color: #3A9B8C;
    }

    .qg-rb-badge.wrong {
      background: rgba(226, 75, 74, 0.12);
      color: #E24B4A;
    }

    .qg-results-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .qg-results-actions .btn-primary,
    .qg-results-actions .btn {
      flex: 1;
      padding: 13px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Global fix for excessive scrolling and bottom spacing */
    html, body {
      margin: 0;
      padding: 0;
      height: auto;
      min-height: 100vh;
    }
    
    body {
      display: flex;
      flex-direction: column;
    }

    .screen {
      flex: 1;
      min-height: auto !important; /* Let flex handle the height without double 100vh */
      padding-bottom: 0 !important;
      margin-bottom: 0 !important;
    }

    /* Override the large empty 60px padding spaces at the bottom of wrappers */
    .qg-body, 
    .translate-body, 
    .l-det-body, 
    .qg-play-body, 
    .qg-results-body,
    .response-layout {
      padding-bottom: 16px !important;
    }

    /* Move minimalist logout button to the top right */
    .minimal-logout-v6 {
      top: 24px !important;
      bottom: auto !important;
    }
  </style>
</head>

<body>

  <!-- ── Auth ── -->
  <div id="screen-auth" class="screen"></div>

  <!-- ── Landing ── -->
  <div id="screen-landing" class="screen active"></div>

  <!-- ── Problem ── -->
  <div id="screen-problem" class="screen"></div>

  <!-- ── Persona ── -->
  <div id="screen-persona" class="screen"></div>

  <!-- ── Chatbot (Chat-only mode) ── -->
  <div id="screen-chatbot" class="screen"></div>

  <!-- ── Response ── -->
  <div id="screen-response" class="screen">
    <div id="response-header" class="screen-header">
      <button class="btn btn-ghost" id="response-back-btn">← Back</button>
      <span class="screen-header-title">Wisdom Awaits</span>
      <div id="xp-bar-mount"></div>
    </div>
    <div class="response-layout">
      <div class="response-main" id="response-main"></div>
      <div class="response-sidebar" id="response-sidebar"></div>
    </div>
  </div>

  <!-- ── Learn ── rendered by Learn.js component ── -->
  <div id="screen-learn" class="screen"></div>

  <!-- ── Manuscript Translator ── -->
  <div id="screen-translate" class="screen"></div>

 <!-- ── Knowledge Graph ── -->
<div id="screen-knowledge-graph" class="screen" style="height: 100vh;"></div>

  <!-- ── Quiz Generator ── -->
  <div id="screen-quiz-gen" class="screen"></div>

  <!-- ── Gamified Version ── -->
  <div id="screen-game" class="screen"></div>



  <script type="module">
    import { state, actions, subscribe, getLevelName } from './src/hooks/useGurukul.js';
    import { renderLanding } from './src/components/LandingPage.js';
    import { renderProblemInput } from './src/components/ProblemInput.js';
    import { renderPersonaSelect } from './src/components/PersonaSelect.js';
    import { renderResponseCards, renderLoading } from './src/components/ResponseCards.js';
    import { renderChatSidebar, updateChatMessages } from './src/components/ChatSidebar.js';
    import { renderChatbotOnly, updateChatbotMessages } from './src/components/ChatbotOnly.js';
    import { renderReflectionQuiz } from './src/components/ReflectionQuiz.js';
    import { renderXPBar, updateXPBar, showLevelUpToast } from './src/components/XPSystem.js';
    import { renderLearn } from './src/components/Learn.js';
import { renderKnowledgeGraphPage } from './src/components/KnowledgeGraph.js';
import { renderTranslationPage } from './src/components/TranslationPage.js';
import { renderQuizGenerator } from './src/components/QuizGenerator.js';
import { renderGame } from './src/components/GameMode.js';
import { renderAuth } from './src/components/Auth.js';

    const screens = {
      landing: document.getElementById('screen-landing'),
      problem: document.getElementById('screen-problem'),
      persona: document.getElementById('screen-persona'),
      chatbot: document.getElementById('screen-chatbot'),
      response: document.getElementById('screen-response'),
      learn: document.getElementById('screen-learn'),
      translate: document.getElementById('screen-translate'),
      knowledgeGraph: document.getElementById('screen-knowledge-graph'),
      quizGen: document.getElementById('screen-quiz-gen'),
      game: document.getElementById('screen-game'),
      auth: document.getElementById('screen-auth'),
    };

    let prevLevel = 0;
    let prevChatLen = 0;
    let learnMounted = false;

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
      window.scrollTo(0, 0);
    }

    function render(s) {
      if (!s.token && s.screen !== 'auth') {
        showScreen('auth');
        renderAuth(screens.auth);
        return;
      }
      
      let screenToDisplay = s.screen;
      if (screenToDisplay.startsWith('game-')) {
        screenToDisplay = 'game';
      }
      showScreen(screenToDisplay);
      switch (s.screen) {
        case 'auth':
          renderAuth(screens.auth);
          break;
        case 'landing':
          renderLanding(screens.landing);
          break;
        case 'problem':
          renderProblemInput(screens.problem);
          break;
        case 'persona':
          // Clear any previous chatbot session so it re-renders fresh
          screens.chatbot.innerHTML = '';
          prevChatLen = 0;
          renderPersonaSelect(screens.persona);
          break;
        case 'response':
          renderXPBar(document.getElementById('xp-bar-mount'));
          updateXPBar();
          const mainEl = document.getElementById('response-main');
          if (s.loading && !s.wisdom) {
            renderLoading(mainEl);
          } else if (s.wisdom) {
            renderResponseCards(mainEl);
            const quizContainer = mainEl.querySelector('#quiz-container');
            if (quizContainer && s.quizData) renderReflectionQuiz(quizContainer);
          }
          const sidebarEl = document.getElementById('response-sidebar');
          if (!sidebarEl.querySelector('.sidebar-header')) {
            prevChatLen = 0;
            renderChatSidebar(sidebarEl);
          } else {
            updateChatMessages(sidebarEl, prevChatLen);
            prevChatLen = s.chatHistory.length;
          }
          document.getElementById('response-back-btn').onclick = () => actions.goTo('persona');
          break;
        case 'chatbot':
          if (!screens.chatbot.querySelector('.chatbot-header')) {
            prevChatLen = 0;
            screens.chatbot.innerHTML = '';
            renderChatbotOnly(screens.chatbot);
          } else {
            updateChatbotMessages(screens.chatbot, prevChatLen);
            prevChatLen = s.chatHistory.length;
          }
          break;
case 'learn':
  if (!learnMounted) {
    renderLearn(screens.learn, () => actions.goTo('landing'));
    learnMounted = true;
  }
  break;

case 'translate':
  if (!screens.translate.hasChildNodes()) {
    renderTranslationPage(screens.translate);
  }
  break;

case 'quizGen':
  renderQuizGenerator(screens.quizGen);
  break;
case 'knowledgeGraph':
  if (!screens.knowledgeGraph.hasChildNodes()) {
    renderKnowledgeGraphPage(screens.knowledgeGraph);
  }
  break;

case 'game-main':
case 'game-levels':
case 'game-play':
case 'game-store':
  renderGame(screens.game);
  break;
      }
      if (s.level > prevLevel) {
        showLevelUpToast(getLevelName());
        prevLevel = s.level;
      } else {
        updateXPBar();
      }
    }

    subscribe(render);

    // ── Init ──
    actions.loadPersonas();
    render(state);
  </script>


</body>

</html>
